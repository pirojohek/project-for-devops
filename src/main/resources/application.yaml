spring:
  application:
    name: project-for-devops
  datasource:
    username: ${DB_USERNAME:my_user}
    password: ${DB_PASSWORD:my_password}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mydb}
    driver-class-name: org.postgresql.Driver
#  cache:
#    type: redis   # включаем Redis как кэш
#  data:
#    redis:
#      host: localhost
#      port: 6379

  redis:
    cluster:
      nodes:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    jdbc:
      dialect: postgresql