spring:
  application:
    name: project-for-devops
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    driver-class-name: org.postgresql.Driver
#  cache:
#    type: redis   # включаем Redis как кэш
#  data:
#    redis:
#      host: localhost
#      port: 6379
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true