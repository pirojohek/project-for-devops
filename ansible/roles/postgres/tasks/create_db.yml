---
- name: Создаем БД
  become: yes
  shell: |
    sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ postgres_db }}'" | grep -q 1 || \
    sudo -u postgres createdb {{ postgres_db }}

- name: Создаем пользователя БД
  become: yes
  shell: |
    sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ postgres_username }}'" | grep -q 1 || \
    sudo -u postgres psql -c "CREATE USER {{ postgres_username }} WITH PASSWORD '{{ postgres_password }}';"

- name: Даем права на БД
  become: yes
  shell: |
    sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ postgres_db }} TO {{ postgres_username }};"
    sudo -u postgres psql -c "ALTER DATABASE {{ postgres_db }} OWNER TO {{ postgres_username }};"