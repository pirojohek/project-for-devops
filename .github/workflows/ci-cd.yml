name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build jar
        run: ./gradlew build
      - name: Deploy via Ansible
        run: ansible-playbook ansible/playbooks/site.yml -i ansible/inventory/hosts.ini -e action=deploy